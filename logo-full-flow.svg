<svg viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog Full Logo - Flow Variant</title>
  <desc>Complete LinkLog logo using V-A Flow thread line style with dual-color wordmark.</desc>
  
  <!-- Logo Mark (left side) - Flow style -->
  <g transform="translate(8, 8)">
    <path d="M10 8
             C10 32, 10 48, 10 58
             Q10 70, 20 70
             L62 70
             Q72 70, 72 58
             L72 40"
          fill="none"
          stroke="#E8915A"
          stroke-width="4.5"
          stroke-linecap="round"/>
    
    <path d="M20 16
             C20 34, 20 44, 20 52
             Q20 60, 27 60
             L55 60
             Q62 60, 62 52
             L62 36"
          fill="none"
          stroke="#7C6AE8"
          stroke-width="2.8"
          stroke-linecap="round"
          opacity="0.7"/>
    
    <circle cx="41" cy="65" r="4.2" fill="#FFFFFF" stroke="#E8915A" stroke-width="1.8"/>
    <circle cx="41" cy="65" r="1.8" fill="#5B8ED0"/>
  </g>
  
  <!-- Wordmark (right side) -->
  <text x="95" y="48" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.3">
    <tspan fill="#E8915A">Link</tspan><tspan fill="#7C6AE8">Log</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="96" y="66" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="11" fill="#9E9893" letter-spacing="0.6">
    连接日志 · 关系复利
  </text>
</svg>
