<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog - Loop-LL</title>
  <desc>Dual-L lines connected head-to-tail forming infinity loop, compound dots along vertical</desc>
  
  <!-- L1 (Link) - warm orange, vertical + horizontal -->
  <path d="M18 8 L18 78 Q18 90, 30 90 L82 90"
        fill="none" stroke="#E8915A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- L2 (Log) - starts from L1's horizontal end, loops back = infinity -->
  <path d="M82 90 Q110 90, 110 66 Q110 42, 82 42 L50 42 Q22 42, 22 54"
        fill="none" stroke="#7C6AE8" stroke-width="3.2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Connection knot where L2 loops back to L1's vertical -->
  <circle cx="20" cy="66" r="5" fill="#FFFFFF" stroke="#E8915A" stroke-width="2"/>
  <circle cx="20" cy="66" r="2" fill="#5B8ED0"/>
  
  <!-- End dot suggesting infinite continuation -->
  <circle cx="82" cy="90" r="3" fill="#5B8ED0" opacity="0.4"/>
  
  <!-- Compound dots along L1 vertical -->
  <circle cx="18" cy="24" r="1.5" fill="#E8915A" opacity="0.2"/>
  <circle cx="18" cy="40" r="1.8" fill="#E8915A" opacity="0.35"/>
  <circle cx="18" cy="56" r="2.2" fill="#E8915A" opacity="0.5"/>
</svg>
