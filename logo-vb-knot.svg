<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog - V-B Knot</title>
  <desc>Thread Line with a tied knot at intersection point symbolizing relationship anchoring.</desc>
  
  <!-- First L (Link) - warm orange -->
  <path d="M18 14
           L18 74
           Q18 88, 30 88
           L82 88
           Q94 88, 94 74
           L94 52"
        fill="none"
        stroke="#E8915A"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Second L (Log) - AI purple -->
  <path d="M30 24
           L30 68
           Q30 78, 38 78
           L72 78
           Q80 78, 80 68
           L80 48"
        fill="none"
        stroke="#7C6AE8"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- Larger knot circle = relationship anchor -->
  <circle cx="54" cy="83" r="7" fill="#FFFFFF" stroke="#E8915A" stroke-width="2.2"/>
  <!-- Small tie mark inside the knot -->
  <path d="M50 80 Q54 84 58 81" fill="none" stroke="#E8915A" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- End dot showing direction -->
  <circle cx="94" cy="52" r="3" fill="#5B8ED0"/>
</svg>
