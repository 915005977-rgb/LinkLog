<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog — Loop-Cascade</title>
  <desc>级联回环双L，复利瀑布，每次回环都更远=复利累积</desc>

  <!-- L1 (Link) — 级联回环 -->
  <path d="M22,8
           C22,28 20,46 22,62
           C24,74 30,82 40,84
           L74,84
           C82,84 86,78 86,70
           C86,60 84,48 82,38
           C80,28 76,24 70,28
           C64,32 62,44 64,56
           C66,66 70,76 76,82
           C80,86 86,84 88,78
           C90,72 90,62 86,56"
        fill="none" stroke="#E8915A" stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- L2 (Log) — 内层级联 -->
  <path d="M34,18
           C34,36 32,50 34,62
           C36,70 40,74 46,74
           L68,74
           C74,74 76,70 76,64
           C76,56 74,46 72,38"
        fill="none" stroke="#7C6AE8" stroke-width="2.8"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Intersection knot -->
  <circle cx="56" cy="79" r="4.5" fill="#FFFFFF" stroke="#E8915A" stroke-width="1.8"/>
  <circle cx="56" cy="79" r="2" fill="#5B8ED0"/>

  <!-- Cascade tail -->
  <path d="M86,56 C90,48 94,40 90,34"
        fill="none" stroke="#E8915A" stroke-width="2"
        opacity="0.25" stroke-linecap="round"/>
  <circle cx="90" cy="32" r="2" fill="#E8915A" opacity="0.2"/>
</svg>
