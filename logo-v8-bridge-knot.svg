<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog — V2 Bridge-Knot</title>
  <desc>交汇处放大为桥拱弧线(Bridge)，横跨两线之间=连接的桥梁</desc>

  <!-- L1 (Link) -->
  <path d="M18,18 L18,78 Q18,92 32,92 L84,92 Q98,92 98,78 L98,54"
        fill="none" stroke="#E8915A" stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- L2 (Log) -->
  <path d="M34,30 L34,72 Q34,82 44,82 L76,82 Q86,82 86,72 L86,52"
        fill="none" stroke="#7C6AE8" stroke-width="2.8"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Bridge arch at intersection point -->
  <ellipse cx="58" cy="87" rx="15" ry="8"
           fill="none" stroke="#E8915A" stroke-width="2"
           opacity="0.4"/>

  <!-- Knot center -->
  <circle cx="58" cy="87" r="4.5" fill="#FFFFFF" stroke="#E8915A" stroke-width="2.5"/>
  <circle cx="58" cy="87" r="2" fill="#7C6AE8"/>

  <!-- Subtle bridge deck line across the arch -->
  <line x1="43" y1="87" x2="73" y2="87"
        stroke="#5B8ED0" stroke-width="1" opacity="0.3"/>
  <circle cx="43" cy="87" r="1.5" fill="#5B8ED0" opacity="0.45"/>
  <circle cx="73" cy="87" r="1.5" fill="#5B8ED0" opacity="0.45"/>
</svg>
