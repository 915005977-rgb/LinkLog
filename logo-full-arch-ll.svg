    <circle cx="10" cy="28" r="1.5" fill="#E8915A" opacity="0.25"/>
    <circle cx="10" cy="42" r="1.8" fill="#E8915A" opacity="0.4"/>
    <circle cx="10" cy="58" r="2.2" fill="#E8915A" opacity="0.55"/>
    <circle cx="10" cy="74" r="2.8" fill="#E8915A" opacity="0.7"/>
    <circle cx="82" cy="28" r="1.5" fill="#7C6AE8" opacity="0.25"/>
    <circle cx="82" cy="42" r="1.8" fill="#7C6AE8" opacity="0.4"/>
