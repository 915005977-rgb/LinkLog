  <title>LinkLog Full Logo - Arch-LL</title>
  <desc>Complete logo with Arch-LL bridge icon and dual-color wordmark</desc>
  
  <!-- Icon: Arch-LL -->
  <g transform="translate(8, 6)">
    <path d="M10 82 L10 38 Q10 6, 46 6"
          fill="none" stroke="#E8915A" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M82 82 L82 38 Q82 6, 46 6"
          fill="none" stroke="#7C6AE8" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M46 6 C40 10, 40 18, 46 16 C52 14, 52 9, 46 6"
