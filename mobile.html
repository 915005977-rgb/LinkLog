<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LinkLog — 连接日志 · 关系复利 · 移动端</title>
  <style>
    :root {
      --color-bg-primary: #F8F6F3;
      --color-bg-secondary: #F1EDE8;
      --color-bg-elevated: #FEFDFB;
      --color-border-subtle: #E8E3DD;
      --color-text-primary: #2C2825;
      --color-text-secondary: #6B6560;
      --color-text-tertiary: #9E9893;
      --color-accent-default: #E8915A;
      --color-accent-hover: #D47E48;
      --color-accent-light: #FDF0E6;
      --color-accent-lighter: #FEF7F0;
      --color-accent-text: #C06E3A;
      --color-ai-default: #7C6AE8;
      --color-ai-lighter: #F8F6FE;
      --color-ai-text: #5B4AC5;
      --color-text-on-accent: #FFFFFF;
      --font-sans: "Inter", "SF Pro Display", -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --duration-fast: 200ms;
      --duration-normal: 300ms;
      --duration-slow: 400ms;
      --duration-spring: 500ms;
      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-decelerate: cubic-bezier(0, 0, 0.2, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Background decorative elements */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      right: -20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232,145,90,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: float-slow 12s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: -15%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124,106,232,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: float-slow 15s ease-in-out infinite reverse;
    }

    @keyframes float-slow {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -30px); }
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 48px;
      text-decoration: none;
      animation: fade-up 0.6s var(--ease-decelerate) both;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      position: relative;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
    }

    .logo-text .accent {
      color: var(--color-accent-default);
    }

    /* Main illustration - animated network */
    .illustration {
      width: 200px;
      height: 200px;
      margin-bottom: 40px;
      position: relative;
      animation: fade-up 0.6s var(--ease-decelerate) 0.1s both;
    }

    .illustration svg {
      width: 100%;
      height: 100%;
    }

    /* Node pulse animation */
    .node-pulse {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .node-pulse:nth-child(2) { animation-delay: 0.5s; }
    .node-pulse:nth-child(3) { animation-delay: 1s; }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; r: 6; }
      50% { opacity: 1; r: 10; }
    }

    .line-flow {
      stroke-dasharray: 6 4;
      animation: dash-flow 4s linear infinite;
    }

    @keyframes dash-flow {
      to { stroke-dashoffset: -40; }
    }

    /* Coming soon badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: var(--color-accent-lighter);
      color: var(--color-accent-text);
      font-size: 13px;
      font-weight: 600;
      border-radius: 9999px;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
      animation: fade-up 0.6s var(--ease-decelerate) 0.2s both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent-default);
      animation: dot-blink 2s ease-in-out infinite;
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Title */
    .title {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 12px;
      animation: fade-up 0.6s var(--ease-decelerate) 0.3s both;
    }

    .subtitle {
      font-size: 16px;
      color: var(--color-text-secondary);
      line-height: 1.7;
      max-width: 320px;
      margin-bottom: 36px;
      animation: fade-up 0.6s var(--ease-decelerate) 0.4s both;
    }

    /* Feature previews - 3 mini cards */
    .features {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      animation: fade-up 0.6s var(--ease-decelerate) 0.5s both;
    }

    .feature-card {
      flex: 1;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      padding: 16px 12px;
      text-align: center;
      opacity: 0.7;
      position: relative;
      overflow: hidden;
    }

    .feature-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(248,246,243,0.6) 100%);
      pointer-events: none;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .feature-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    /* CTA */
    .cta-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-accent-default);
      color: var(--color-text-on-accent);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      text-decoration: none;
      min-height: 48px;
      transition: background var(--duration-fast) var(--ease-out),
                  transform var(--duration-fast) var(--ease-spring),
                  box-shadow var(--duration-fast) var(--ease-out);
      animation: fade-up 0.6s var(--ease-decelerate) 0.6s both;
    }

    .cta-primary:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232,145,90,0.2);
    }

    .cta-primary:active {
      transform: translateY(0);
    }

    .cta-primary svg {
      width: 18px;
      height: 18px;
    }

    .cta-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-tertiary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: color var(--duration-fast) var(--ease-out),
                  background var(--duration-fast) var(--ease-out);
      animation: fade-up 0.6s var(--ease-decelerate) 0.7s both;
    }

    .cta-secondary:hover {
      color: var(--color-text-secondary);
      background: var(--color-bg-secondary);
    }

    .cta-secondary svg {
      width: 14px;
      height: 14px;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--color-text-tertiary);
      background: linear-gradient(0deg, var(--color-bg-primary) 60%, transparent);
    }

    .footer a {
      color: var(--color-accent-default);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Animation utility */
    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 50ms !important;
        transition-duration: 50ms !important;
      }
    }
  </style>
</head>
