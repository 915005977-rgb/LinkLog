<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog - Bridge-8</title>
  <desc>Infinity-8 formed by two bridge arches with compound growth nodes along the deck</desc>
  
  <!-- Left lobe of 8 = bridge arch (warm orange = Link) -->
  <path d="M60 58 C60 24, 14 24, 14 58 C14 92, 60 92, 60 58"
        fill="none" stroke="#E8915A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Right lobe of 8 = bridge arch (AI purple = Log) -->
  <path d="M60 58 C60 24, 106 24, 106 58 C106 92, 60 92, 60 58"
        fill="none" stroke="#7C6AE8" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  
  <!-- Center crossing node -->
  <circle cx="60" cy="58" r="5.5" fill="#FFFFFF" stroke="#E8915A" stroke-width="2"/>
  <circle cx="60" cy="58" r="2.2" fill="#5B8ED0"/>
  
  <!-- Compound growth dots along bottom -->
  <circle cx="24" cy="92" r="1.5" fill="#E8915A" opacity="0.2"/>
  <circle cx="36" cy="92" r="2" fill="#E8915A" opacity="0.35"/>
  <circle cx="48" cy="92" r="2.8" fill="#E8915A" opacity="0.5"/>
  <circle cx="72" cy="92" r="2.8" fill="#7C6AE8" opacity="0.5"/>
  <circle cx="84" cy="92" r="2" fill="#7C6AE8" opacity="0.35"/>
  <circle cx="96" cy="92" r="1.5" fill="#7C6AE8" opacity="0.2"/>
</svg>
