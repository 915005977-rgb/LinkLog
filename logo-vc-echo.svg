<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog - V-C Echo</title>
  <desc>Thread Line with fading echo trails at line ends suggesting continuous logging.</desc>
  
  <!-- First L (Link) - warm orange -->
  <path d="M18 14
           L18 74
           Q18 88, 30 88
           L82 88
           Q94 88, 94 74
           L94 52"
        fill="none"
        stroke="#E8915A"
        stroke-width="5"
        stroke-linecap="round"/>
  
  <!-- Second L (Log) - AI purple -->
  <path d="M30 24
           L30 68
           Q30 78, 38 78
           L72 78
           Q80 78, 80 68
           L80 48"
        fill="none"
        stroke="#7C6AE8"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.65"/>
  
  <!-- Intersection knot -->
  <circle cx="54" cy="83" r="4.5" fill="#FFFFFF" stroke="#E8915A" stroke-width="1.8"/>
  
  <!-- Echo trail from orange line end (fading outwards) -->
  <line x1="98" y1="47" x2="108" y2="42" stroke="#E8915A" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="104" y1="39" x2="112" y2="35" stroke="#E8915A" stroke-width="1.3" stroke-linecap="round" opacity="0.15"/>
  
  <!-- Echo trail from purple line end -->
  <line x1="84" y1="43" x2="91" y2="37" stroke="#7C6AE8" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
</svg>
