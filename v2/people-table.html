<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>人物资料表 · LinkLog V2</title>
  <!-- 原型类型: PC宽表格 | 设计系统: LinkLog V2 Design Tokens -->
  <style>
    /* ============================
       设计令牌 - LinkLog V2
       ============================ */
    :root {
      /* 色彩 */
      --color-bg-primary: #F8F6F3;
      --color-bg-secondary: #F1EDE8;
      --color-bg-tertiary: #EAE5DF;
      --color-bg-elevated: #FFFFFF;
      --color-border-subtle: #E8E3DD;
      --color-border-default: #D4CFC8;
      --color-text-primary: #2C2825;
      --color-text-secondary: #6B6560;
      --color-text-tertiary: #9E9893;
      --color-text-disabled: #C5C0BA;
      --color-accent-default: #E8915A;
      --color-accent-hover: #D47E48;
      --color-accent-active: #C06E3A;
      --color-accent-light: #FDF0E6;
      --color-accent-lighter: #FEF7F0;
      --color-accent-text: #C06E3A;
      --color-ai-default: #7C6AE8;
      --color-ai-hover: #6B59D6;
      --color-ai-light: #F0EDFC;
      --color-ai-lighter: #F8F6FE;
      --color-ai-text: #5B4AC5;
      --color-ai-glow: rgba(124,106,232,0.15);
      --color-success-default: #4CAF7D;
      --color-success-light: #E8F5EE;
      --color-warning-default: #E5A84B;
      --color-warning-light: #FDF5E6;
      --color-error-default: #D95555;
      --color-error-light: #FDEAEA;
      --color-info-default: #5B8ED0;
      --color-info-light: #E8F0FA;
      --color-tag-relational: #E8915A;
      --color-tag-contextual: #7C6AE8;
      --color-tag-custom: #5B8ED0;
      --color-tag-bg-base: #F1EDE8;

      /* 档案线色彩 */
      --color-line-origin: #7C9A8E;
      --color-line-origin-light: #EDF3F0;
      --color-line-value: #D4915A;
      --color-line-value-light: #FDF0E6;
      --color-line-connection: #5B8ED0;
      --color-line-connection-light: #E8F0FA;
      --color-line-action: #7C6AE8;
      --color-line-action-light: #F0EDFC;

      /* PC端容器 */
      --container-pc: 1320px;

      /* 排版 */
      --font-sans: "Inter", "SF Pro Display", -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;
      --text-display: 28px;
      --text-h1: 22px;
      --text-h2: 18px;
      --text-h3: 16px;
      --text-body: 15px;
      --text-body-sm: 13px;
      --text-caption: 12px;
      --text-micro: 11px;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;

      /* 间距 */
      --space-1: 4px; --space-2: 8px; --space-3: 12px;
      --space-4: 16px; --space-5: 20px; --space-6: 24px;
      --space-8: 32px; --space-10: 40px; --space-12: 48px;

      /* 圆角 */
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
      --radius-xl: 20px; --radius-full: 9999px;

      /* 阴影 */
      --shadow-xs: 0 1px 2px rgba(44,40,37,0.04);
      --shadow-sm: 0 2px 8px rgba(44,40,37,0.06);
      --shadow-md: 0 4px 16px rgba(44,40,37,0.08);
      --shadow-lg: 0 8px 32px rgba(44,40,37,0.10);
      --shadow-focus: 0 0 0 3px rgba(232,145,90,0.3);

      /* 动效 */
      --duration-fast: 200ms;
      --duration-normal: 300ms;
      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);

      /* 补充语义色（审查修正） */
      --color-text-on-accent: #FFFFFF;
      --color-bg-frosted: rgba(248,246,243,0.92);
      --color-bg-glass: rgba(255,255,255,0.6);
      --color-bg-card-glass: rgba(255,255,255,0.7);
      --color-bg-cell-sticky: rgba(255,255,255,0.95);
      --color-bg-cell-sticky-hover: rgba(254,247,240,0.98);
      --color-ai-border-subtle: rgba(124,106,232,0.2);
      --color-ai-bg-subtle: rgba(124,106,232,0.10);
    }

    /* ============================
       基础重置
       ============================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-body);
      color: var(--color-text-primary);
      background-color: var(--color-bg-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    details:focus-visible,
    summary:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus);
      border-radius: var(--radius-sm);
    }

    /* ============================
       减弱动效
       ============================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================
       全局导航
       ============================ */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-3) 0;
      margin-bottom: var(--space-4);
      background: var(--color-bg-frosted);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border-subtle);
      border-radius: 0;
    }

    .nav-brand {
      font-size: var(--text-h2);
      font-weight: var(--weight-bold);
      color: var(--color-text-primary);
      text-decoration: none;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .nav-brand .accent {
      color: var(--color-accent-default);
    }

    .nav-links {
      display: flex;
      gap: var(--space-1);
      flex: 1;
    }

    .nav-link {
      font-size: var(--text-body-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      text-decoration: none;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      transition: color var(--duration-fast) var(--ease-out),
                  background var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }

    .nav-link:hover {
      color: var(--color-text-primary);
      background: var(--color-bg-tertiary);
    }

    .nav-link.active {
      color: var(--color-accent-text);
      background: var(--color-accent-light);
    }

    .nav-github {
      color: var(--color-text-tertiary);
      transition: color var(--duration-fast) var(--ease-out);
      flex-shrink: 0;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      text-decoration: none;
    }

    .nav-github:hover {
      color: var(--color-text-primary);
    }

    /* ============================
       页面布局
       ============================ */
    .page-container {
      max-width: var(--container-pc);
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
    }

    /* ============================
       顶部区域
       ============================ */
    .page-header {
      margin-bottom: var(--space-8);
    }

    .page-header h1 {
      font-size: var(--text-display);
      font-weight: var(--weight-bold);
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-2);
    }

    .page-header .subtitle {
      font-size: var(--text-body);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-6);
    }

    /* 统计概览 */
    .stats-row {
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      font-size: var(--text-body-sm);
    }

    .stat-item .stat-number {
      font-size: var(--text-h2);
      font-weight: var(--weight-bold);
      color: var(--color-text-primary);
    }

    .stat-item .stat-label {
      color: var(--color-text-secondary);
    }

    .stat-item.stat-accent .stat-number {
      color: var(--color-accent-text);
    }

    .stat-item.stat-ai .stat-number {
      color: var(--color-ai-text);
    }

    .stat-item.stat-success .stat-number {
      color: var(--color-success-default);
    }

    /* ============================
       工具栏（sticky）
       ============================ */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--color-bg-frosted);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: var(--space-4) 0;
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .search-box {
      flex: 0 0 260px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: var(--space-2) var(--space-3) var(--space-2) var(--space-8);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      font-size: var(--text-body-sm);
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      background: var(--color-bg-elevated);
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .search-box input::placeholder {
      color: var(--color-text-tertiary);
    }

    .search-box input:focus {
      border-color: var(--color-accent-default);
      outline: none;
      box-shadow: var(--shadow-focus);
    }

    .search-box .search-icon {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-tertiary);
    }

    .filter-chips {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      flex: 1;
    }

    .chip {
      padding: var(--space-1) var(--space-3);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-full);
      font-size: var(--text-caption);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      background: var(--color-bg-elevated);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--color-accent-default);
      color: var(--color-accent-text);
    }

    .chip.active {
      background: var(--color-accent-default);
      border-color: var(--color-accent-default);
      color: var(--color-text-on-accent);
    }

    .priority-filter {
      display: flex;
      gap: var(--space-2);
    }

    .priority-chip {
      padding: var(--space-1) var(--space-3);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-full);
      font-size: var(--text-caption);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }

    .priority-chip.priority-today {
      color: var(--color-accent-text);
      background: var(--color-accent-lighter);
      border-color: var(--color-accent-default);
    }

    .priority-chip.priority-today.active {
      background: var(--color-accent-default);
      color: var(--color-text-on-accent);
    }

    .priority-chip.priority-deep {
      color: var(--color-ai-text);
      background: var(--color-ai-lighter);
      border-color: var(--color-ai-default);
    }

    .priority-chip.priority-deep.active {
      background: var(--color-ai-default);
      color: var(--color-text-on-accent);
    }

    .priority-chip.priority-online {
      color: var(--color-success-default);
      background: var(--color-success-light);
      border-color: var(--color-success-default);
    }

    .priority-chip.priority-online.active {
      background: var(--color-success-default);
      color: var(--color-text-on-accent);
    }

    /* ============================
       宽表格容器
       ============================ */
    .table-wrapper {
      background: var(--color-bg-glass);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .table-scroll {
      overflow-x: auto;
      overflow-y: visible;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-10);
      color: var(--color-text-tertiary);
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    /* 列宽定义 */
    col.col-person   { width: 200px; }
    col.col-priority { width: 80px; }
    col.col-origin   { width: 240px; }
    col.col-value    { width: 220px; }
    col.col-advantage{ width: 200px; }
    col.col-connection{ width: 220px; }
    col.col-relation { width: 300px; }

    /* 表头 */
    thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--color-bg-secondary);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--color-text-secondary);
      text-align: left;
      border-bottom: 2px solid var(--color-border-default);
      white-space: nowrap;
    }

    thead th:first-child {
      z-index: 15;
      position: sticky;
      left: 0;
    }

    /* 首列 sticky */
    tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 5;
      background: var(--color-bg-cell-sticky);
    }

    /* 表体单元格 */
    tbody td {
      padding: var(--space-4);
      border-bottom: 1px solid var(--color-border-subtle);
      vertical-align: top;
      font-size: var(--text-body-sm);
      color: var(--color-text-secondary);
      line-height: 1.5;
      transition: background var(--duration-fast) var(--ease-out);
    }

    tbody tr:hover td {
      background: var(--color-accent-lighter);
    }

    tbody tr:hover td:first-child {
      background: var(--color-bg-cell-sticky-hover);
    }

    /* ============================
       首列：人物信息
       ============================ */
    .person-cell {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .person-top {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-h3);
      font-weight: var(--weight-bold);
      color: var(--color-text-on-accent);
      flex-shrink: 0;
    }

    .person-info {
      min-width: 0;
    }

    .person-name {
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .person-role {
      font-size: var(--text-caption);
      color: var(--color-text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
    }

    .tag {
      display: inline-block;
      padding: 1px var(--space-2);
      border-radius: var(--radius-full);
      font-size: var(--text-micro);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .tag:hover {
      filter: brightness(0.95);
    }

    .tag-relational {
      background: rgba(232,145,90,0.12);
      color: var(--color-tag-relational);
    }

    .tag-contextual {
      background: var(--color-ai-bg-subtle);
      color: var(--color-tag-contextual);
    }

    .tag-custom {
      background: rgba(91,142,208,0.10);
      color: var(--color-tag-custom);
    }

    /* ============================
       优先级标记
       ============================ */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-full);
      font-size: var(--text-micro);
      font-weight: var(--weight-semibold);
      white-space: nowrap;
    }

    .priority-badge.badge-today {
      background: var(--color-accent-light);
      color: var(--color-accent-text);
    }

    .priority-badge.badge-deep {
      background: var(--color-ai-light);
      color: var(--color-ai-text);
    }

    .priority-badge.badge-online {
      background: var(--color-success-light);
      color: var(--color-success-default);
    }

    .priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-today .priority-dot { background: var(--color-accent-default); }
    .badge-deep .priority-dot { background: var(--color-ai-default); }
    .badge-online .priority-dot { background: var(--color-success-default); }

    /* ============================
       Mini-block 排版
       ============================ */
    .mini-block {
      margin-bottom: var(--space-3);
    }

    .mini-block:last-child {
      margin-bottom: 0;
    }

    .mini-block-title {
      font-size: var(--text-micro);
      font-weight: var(--weight-semibold);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--space-1);
    }

    .mini-block-content {
      font-size: var(--text-body-sm);
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    /* 档案线色彩标记 */
    .line-origin .mini-block-title { color: var(--color-line-origin); }
    .line-value .mini-block-title { color: var(--color-line-value); }
    .line-connection .mini-block-title { color: var(--color-line-connection); }
    .line-action .mini-block-title { color: var(--color-line-action); }

    .cell-origin { border-left: 3px solid var(--color-line-origin); padding-left: calc(var(--space-4) - 3px); }
    .cell-value { border-left: 3px solid var(--color-line-value); padding-left: calc(var(--space-4) - 3px); }
    .cell-advantage { border-left: 3px solid var(--color-line-value); padding-left: calc(var(--space-4) - 3px); }
    .cell-connection { border-left: 3px solid var(--color-line-connection); padding-left: calc(var(--space-4) - 3px); }
    .cell-relation { border-left: 3px solid var(--color-line-action); padding-left: calc(var(--space-4) - 3px); }

    /* ============================
       AI 辅助内容
       ============================ */
    .ai-block {
      border: 1px dashed var(--color-ai-default);
      border-radius: var(--radius-sm);
      padding: var(--space-2) var(--space-3);
      background: var(--color-ai-lighter);
      margin-top: var(--space-2);
    }

    .ai-block .mini-block-title {
      color: var(--color-ai-text);
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--text-micro);
      color: var(--color-ai-text);
      font-weight: var(--weight-medium);
    }

    /* ============================
       展开完整档案
       ============================ */
    .expand-detail {
      margin-top: var(--space-3);
    }

    .expand-detail summary {
      font-size: var(--text-caption);
      color: var(--color-accent-text);
      font-weight: var(--weight-medium);
      cursor: pointer;
      padding: var(--space-1) 0;
      transition: color var(--duration-fast) var(--ease-out);
      list-style: none;
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .expand-detail summary::-webkit-details-marker {
      display: none;
    }

    .expand-detail summary::before {
      content: "▸";
      font-size: var(--text-caption);
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .expand-detail[open] summary::before {
      transform: rotate(90deg);
    }

    .expand-detail summary:hover {
      color: var(--color-accent-hover);
    }

    .expand-content {
      padding: var(--space-3) 0 0;
      font-size: var(--text-body-sm);
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    .expand-content .field-pair {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .expand-content .field-label {
      flex-shrink: 0;
      font-size: var(--text-micro);
      font-weight: var(--weight-semibold);
      color: var(--color-text-tertiary);
      min-width: 72px;
    }

    .expand-content .field-value {
      color: var(--color-text-secondary);
    }

    /* ============================
       商业化进度条
       ============================ */
    .progress-mini {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-1);
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--color-bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--color-line-value);

    // ============================
    // 渲染函数
    // ============================
    function renderPriorityBadge(priority) {
      const map = {
        today: { cls: 'badge-today', label: '今日重点' },
        deep: { cls: 'badge-deep', label: '深聊对象' },
        online: { cls: 'badge-online', label: 'Online' }
      };
      const p = map[priority];
      return `<span class="priority-badge ${p.cls}"><span class="priority-dot"></span>${p.label}</span>`;
    }

    function renderTags(tags) {
      return tags.map(t =>
        `<span class="tag tag-${t.type}" data-tag="${t.text}">${t.text}</span>`
      ).join('');
    }

    function renderPerson(p) {
      const initial = p.name.charAt(0);
      return `
        <td>
          <div class="person-cell">
            <div class="person-top">
              <div class="avatar" style="background:${p.avatarColor}">${initial}</div>
              <div class="person-info">
                <div class="person-name">${p.name}</div>
                <div class="person-role">${p.role}</div>
              </div>
            </div>
            <div class="tag-group">${renderTags(p.tags)}</div>
          </div>
        </td>
        <td>${renderPriorityBadge(p.priority)}</td>
        <td class="cell-origin">
          <div class="mini-block line-origin">
            <div class="mini-block-title">背景</div>
            <div class="mini-block-content">${p.origin.background}</div>
          </div>
          <div class="mini-block line-origin">
            <div class="mini-block-title">现在</div>
            <div class="mini-block-content">${p.origin.now}</div>
          </div>
        </td>
        <td class="cell-value">
          <div class="mini-block line-value">
            <div class="mini-block-title">产品/服务</div>
            <div class="mini-block-content">${p.value.product}</div>
          </div>
          <div class="mini-block line-value">
            <div class="mini-block-title">商业化</div>
            <div class="progress-mini">
              <div class="progress-track"><div class="progress-fill" style="width:${p.value.progress}%"></div></div>
              <span class="progress-label">${p.value.progressLabel}</span>
            </div>
          </div>
        </td>
        <td class="cell-advantage">
          <div class="mini-block line-value">
            <div class="mini-block-title">优势</div>
            <div class="mini-block-content">${p.advantage.strength}</div>
          </div>
          ${p.advantage.canProvideAI ? `
          <div class="ai-block">
            <div class="mini-block-title"><span class="ai-badge"><svg width="10" height="10" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 8L7 9.5L10.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> AI 辅助</span></div>
            <div class="mini-block-content">${p.advantage.canProvide}</div>
          </div>` : `
          <div class="mini-block line-value">
            <div class="mini-block-title">你能提供</div>
            <div class="mini-block-content">${p.advantage.canProvide}</div>
          </div>`}
        </td>
        <td class="cell-connection">
          <div class="mini-block line-connection">
            <div class="mini-block-title">卡点</div>
            <div class="mini-block-content">${p.connection.block}</div>
          </div>
          <div class="mini-block line-connection">
            <div class="mini-block-title">想链接</div>
            <div class="mini-block-content">${p.connection.want}</div>
          </div>
        </td>
        <td class="cell-relation">
          <div class="mini-block line-action">
            <div class="mini-block-title">与你的关联</div>
            <div class="mini-block-content">${p.relation.link}</div>
          </div>
          <details class="expand-detail">
            <summary>展开完整档案</summary>
            <div class="expand-content">
              <div class="field-pair">
                <span class="field-label">可学</span>
                <span class="field-value">${p.relation.canLearn}</span>
              </div>
              <div class="field-pair">
                <span class="field-label">现场话题</span>
                <span class="field-value">${p.relation.topic}</span>
              </div>
              <div class="field-pair">
                <span class="field-label">会后动作</span>
                <span class="field-value">${p.relation.action}</span>
              </div>
            </div>
          </details>
        </td>
      `;
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      const filtered = getFilteredPeople();
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state">没有匹配的联系人</td></tr>`;
        return;
      }
      filtered.forEach(p => {
        const tr = document.createElement('tr');
        tr.dataset.name = p.name;
        tr.dataset.tags = p.tags.map(t => t.text).join(',');
        tr.dataset.priority = p.priority;
        tr.innerHTML = renderPerson(p);
        tbody.appendChild(tr);
      });
    }

    // ============================
    // 筛选逻辑
    // ============================
    let activeTag = 'all';
    let activePriority = null;
    let searchQuery = '';

    function getFilteredPeople() {
      return people.filter(p => {
        // 标签筛选
        if (activeTag !== 'all' && !p.tags.some(t => t.text === activeTag)) return false;
        // 优先级筛选
        if (activePriority && p.priority !== activePriority) return false;
        // 搜索
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          const searchStr = (p.name + p.role + p.tags.map(t => t.text).join(' ')).toLowerCase();
          if (!searchStr.includes(q)) return false;
        }
        return true;
      });
    }

    // 标签筛选
    document.getElementById('tagFilters').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      document.querySelectorAll('#tagFilters .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeTag = chip.dataset.tag;
      renderTable();
    });

    // 优先级筛选（toggle）
    document.querySelectorAll('.priority-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const p = chip.dataset.priority;
        if (activePriority === p) {
          activePriority = null;
          chip.classList.remove('active');
        } else {
          document.querySelectorAll('.priority-chip').forEach(c => c.classList.remove('active'));
          activePriority = p;
          chip.classList.add('active');
        }
        renderTable();
      });
    });

    // 搜索
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderTable();
    });

    // 标签点击筛选
    document.getElementById('tableBody').addEventListener('click', e => {
      const tag = e.target.closest('.tag');
      if (!tag) return;
      const tagText = tag.dataset.tag;
      // 设置 tag filter
      activeTag = tagText;
      document.querySelectorAll('#tagFilters .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.tag === tagText);
      });
      // 如果没有对应的 chip，选中"全部"之外高亮
      const hasChip = document.querySelector(`#tagFilters .chip[data-tag="${tagText}"]`);
      if (!hasChip) {
        document.querySelectorAll('#tagFilters .chip').forEach(c => c.classList.remove('active'));
      }
      renderTable();
    });

    // 初始渲染
    renderTable();
  </script>
