<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog - Infinity-Bridge</title>
  <desc>Infinity symbol sitting on bridge pillars with compound growth nodes descending</desc>
  
  <!-- Infinity left loop (warm orange) -->
  <path d="M26 52 C26 24, 54 24, 60 42 C66 60, 38 60, 26 52"
        fill="none" stroke="#E8915A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Infinity right loop (AI purple) -->
  <path d="M60 42 C66 24, 94 24, 94 52 C94 80, 66 80, 60 62"
        fill="none" stroke="#7C6AE8" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  
  <!-- Left infinity tail completing the loop -->
  <path d="M60 62 C54 80, 26 80, 26 52"
        fill="none" stroke="#E8915A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Bridge pillars (subtle) -->
  <line x1="40" y1="70" x2="40" y2="105" stroke="#2C2825" stroke-width="3" stroke-linecap="round" opacity="0.12"/>
  <line x1="80" y1="70" x2="80" y2="105" stroke="#2C2825" stroke-width="3" stroke-linecap="round" opacity="0.12"/>
  
  <!-- Bridge deck -->
  <line x1="20" y1="105" x2="100" y2="105" stroke="#2C2825" stroke-width="2.5" stroke-linecap="round" opacity="0.1"/>
  
  <!-- Center crossing node -->
  <circle cx="60" cy="52" r="4" fill="#FFFFFF" stroke="#5B8ED0" stroke-width="1.8"/>
  
  <!-- Compound growth dots on left pillar (growing downward = compounding) -->
  <circle cx="40" cy="78" r="1.8" fill="#E8915A" opacity="0.3"/>
  <circle cx="40" cy="88" r="2.3" fill="#E8915A" opacity="0.5"/>
  <circle cx="40" cy="98" r="3" fill="#E8915A" opacity="0.7"/>
  
  <!-- Compound growth dots on right pillar -->
  <circle cx="80" cy="78" r="1.8" fill="#7C6AE8" opacity="0.3"/>
  <circle cx="80" cy="88" r="2.3" fill="#7C6AE8" opacity="0.5"/>
  <circle cx="80" cy="98" r="3" fill="#7C6AE8" opacity="0.7"/>
</svg>
