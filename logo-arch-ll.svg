<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog - Arch-LL</title>
  <desc>Dual-L as bridge arch pillars meeting at apex with infinity twist and compound growth nodes</desc>
  
  <!-- L1 (Link) vertical curves into arch from left -->
  <path d="M16 112 L16 52 Q16 8, 60 8"
        fill="none" stroke="#E8915A" stroke-width="5.5" stroke-linecap="round"/>
  
  <!-- L2 (Log) vertical curves into arch from right -->
  <path d="M104 112 L104 52 Q104 8, 60 8"
        fill="none" stroke="#7C6AE8" stroke-width="5.5" stroke-linecap="round" opacity="0.75"/>
  
  <!-- Infinity twist at the apex -->
  <path d="M60 8 C52 14, 52 26, 60 22 C68 18, 68 12, 60 8"
        fill="none" stroke="#5B8ED0" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  
  <!-- Compound growth: left pillar nodes (increasing downward) -->
  <circle cx="16" cy="34" r="1.8" fill="#E8915A" opacity="0.2"/>
  <circle cx="16" cy="52" r="2.2" fill="#E8915A" opacity="0.35"/>
  <circle cx="16" cy="72" r="2.8" fill="#E8915A" opacity="0.5"/>
  <circle cx="16" cy="96" r="3.5" fill="#E8915A" opacity="0.7"/>
  
  <!-- Compound growth: right pillar nodes -->
  <circle cx="104" cy="34" r="1.8" fill="#7C6AE8" opacity="0.2"/>
  <circle cx="104" cy="52" r="2.2" fill="#7C6AE8" opacity="0.35"/>
  <circle cx="104" cy="72" r="2.8" fill="#7C6AE8" opacity="0.5"/>
  <circle cx="104" cy="96" r="3.5" fill="#7C6AE8" opacity="0.7"/>
</svg>
