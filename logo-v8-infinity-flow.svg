<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LinkLog — V1 Infinity-Flow</title>
  <desc>V-A Flow 升级版：尾部∞回环暗示无限循环与复利增长</desc>

  <!-- L1 (Link) - warm orange with bezier curve -->
  <path d="M20,16
           C20,42 20,58 20,72
           Q20,86 32,86
           L82,86
           Q94,86 94,74
           L94,52
           C94,40 88,34 80,38
           C72,42 68,54 68,66
           L68,86"
        fill="none"
        stroke="#E8915A"
        stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- L2 (Log) - AI purple, nested thinner -->
  <path d="M32,28
           C32,46 32,56 32,66
           Q32,76 40,76
           L70,76
           Q78,76 78,66
           L78,48"
        fill="none"
        stroke="#7C6AE8"
        stroke-width="2.8"
        stroke-linecap="round"
        opacity="0.7"/>

  <!-- Intersection knot -->
  <circle cx="54" cy="81" r="5" fill="#FFFFFF" stroke="#E8915A" stroke-width="2"/>
  <circle cx="54" cy="81" r="2" fill="#5B8ED0"/>

  <!-- Infinity tail: L2 curves back suggesting endless loop -->
  <path d="M68,86 C68,100 78,108 88,102"
        fill="none" stroke="#E8915A" stroke-width="2.5"
        opacity="0.35" stroke-linecap="round"/>
  <circle cx="92" cy="100" r="2.5" fill="#E8915A" opacity="0.3"/>
</svg>
